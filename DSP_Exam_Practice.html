<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSP Practice Exam — Ch 7-10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#f1f5f9;--text2:#94a3b8;--border:#475569;--correct-bg:rgba(34,197,94,.12);--wrong-bg:rgba(239,68,68,.12)}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:16px}
h1{font-size:1.6rem;text-align:center;margin:20px 0 8px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:24px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--text2);font-size:.85rem;transition:.2s}
.tab:hover{border-color:var(--accent)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:10px;padding:0 7px;font-size:.75rem;margin-left:5px}
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:14px;border:1px solid transparent;transition:.2s}
.card.correct-card{border-color:var(--green);background:var(--correct-bg)}
.card.wrong-card{border-color:var(--red);background:var(--wrong-bg)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-weight:700;color:var(--accent2);font-size:.95rem}
.q-ch{font-size:.75rem;color:var(--text2);background:var(--card2);padding:2px 10px;border-radius:12px}
.q-text{font-size:1rem;margin-bottom:14px;line-height:1.7}
.q-text code{background:var(--card2);padding:1px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:.9em}
.options{display:grid;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:.15s;user-select:none}
.opt:hover{border-color:var(--accent);background:rgba(99,102,241,.08)}
.opt.selected{border-color:var(--accent);background:rgba(99,102,241,.15)}
.opt.show-correct{border-color:var(--green);background:var(--correct-bg)}
.opt.show-wrong{border-color:var(--red);background:var(--wrong-bg)}
.opt-letter{min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--border);font-size:.8rem;font-weight:600;flex-shrink:0;margin-top:1px}
.opt.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.show-correct .opt-letter{background:var(--green);border-color:var(--green);color:#fff}
.opt.show-wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.opt-text{font-size:.9rem;line-height:1.5}
.calc-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:.95rem;resize:vertical;min-height:100px;font-family:inherit}
.calc-input:focus{outline:none;border-color:var(--accent)}
.hint-box{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:.85rem;line-height:1.6}
.hint-box.ans{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
.hint-box.explain{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#c7d2fe}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.scoreboard{background:linear-gradient(135deg,#312e81,#1e1b4b);border-radius:16px;padding:24px;text-align:center;margin:20px 0}
.score-big{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--green),#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-sub{color:var(--text2);font-size:.9rem;margin-top:4px}
.progress-bar{height:4px;background:var(--card2);border-radius:4px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:4px;margin:12px 0}
.nav-cell{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:.15s}
.nav-cell:hover{border-color:var(--accent)}
.nav-cell.answered{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-cell.nav-correct{background:var(--green);border-color:var(--green);color:#fff}
.nav-cell.nav-wrong{background:var(--red);border-color:var(--red);color:#fff}
.nav-cell.current{box-shadow:0 0 0 2px var(--yellow)}
.timer{text-align:center;font-size:1.3rem;font-weight:700;color:var(--yellow);margin:8px 0}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.hidden{display:none}
.tag-multi{font-size:.7rem;background:var(--yellow);color:#000;padding:1px 6px;border-radius:8px;font-weight:600}
.tag-single{font-size:.7rem;background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;font-weight:600}
.formula{font-family:'Courier New',monospace;background:var(--card2);padding:2px 8px;border-radius:4px;white-space:nowrap}
@media(max-width:600px){.container{padding:10px}.q-text{font-size:.92rem}.opt{padding:8px 10px}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ============ QUESTION DATA ============
const LETTERS = "ABCDEFGHIJ";

// MCQ: ch, question, options[10], correctIndices[]
// If correctIndices.length > 1 → multi-answer
const MCQ = [
// ===== CHAPTER 7: Time-Frequency Analysis (15 questions) =====
{ch:7, q:"Time-Frequency Analysis (TFA) คืออะไร และทำไมถึงจำเป็น", opts:[
"วิธีวิเคราะห์สัญญาณที่ให้ทั้งข้อมูลเวลาและความถี่พร้อมกัน สำหรับสัญญาณที่ความถี่เปลี่ยนตามเวลา",
"วิธีที่เหมือน Fourier Transform ทุกประการ แต่เร็วกว่า",
"ใช้สำหรับสัญญาณ stationary (ความถี่คงที่) เท่านั้น",
"Fourier Transform ก็ให้ข้อมูล time-frequency ได้อยู่แล้ว ไม่จำเป็นต้องมี TFA",
"TFA ใช้ได้เฉพาะกับสัญญาณ EEG เท่านั้น",
"สัญญาณ non-stationary เช่น เสียงพูด, chirp, EEG ต้องการ TFA",
"TFA บอกได้ว่าความถี่ใดเกิดขึ้น เมื่อไหร่",
"ข้อ A, F, G ถูกทั้งหมด",
"TFA เป็นชื่ออื่นของ FFT",
"TFA ใช้ได้เฉพาะสัญญาณดิจิทัลเท่านั้น"], ans:[0,5,6,7]},

{ch:7, q:"ข้อจำกัดของ Fourier Transform แบบปกติในการวิเคราะห์สัญญาณ non-stationary คืออะไร", opts:[
"บอกได้แค่ว่ามีความถี่อะไรในสัญญาณ แต่ไม่รู้ว่าความถี่นั้นเกิดขึ้น เมื่อไหร่",
"คำนวณช้าเกินไป",
"ใช้ได้เฉพาะสัญญาณที่มีความถี่เดียว",
"ไม่สามารถวิเคราะห์สัญญาณดิจิทัลได้",
"สัญญาณ 2 ตัวที่ต่างกันในโดเมนเวลาอาจให้ magnitude spectrum เหมือนกัน",
"Fourier Transform ทำลายข้อมูลเฟส (phase) ทั้งหมด",
"ข้อ A และ E ถูกทั้งหมด",
"ใช้ memory มากเกินไป",
"Fourier Transform ใช้กับ non-stationary signal ได้ปกติ ไม่มีข้อจำกัด",
"ไม่สามารถวิเคราะห์สัญญาณที่มีความถี่มากกว่า 1 ความถี่"], ans:[0,4,6]},

{ch:7, q:"Short-Time Fourier Transform (STFT) มีหลักการทำงานอย่างไร", opts:[
"ตัดสัญญาณออกเป็นช่วงสั้นๆ ด้วย window function แล้วทำ Fourier Transform ในแต่ละช่วง",
"ทำ Fourier Transform กับสัญญาณทั้งหมดแบบต่อเนื่องโดยไม่มีการตัด",
"ใช้ wavelet เป็น basis function แทน sinusoid",
"คำนวณเฉพาะ magnitude spectrum โดยไม่มีข้อมูลเวลา",
"STFT = DFT ที่คำนวณซ้ำๆ โดยไม่มี window",
"ผลลัพธ์ของ STFT เรียกว่า Spectrogram",
"STFT ให้ข้อมูล joint time-frequency representation",
"ข้อ A, F, G ถูกทั้งหมด",
"STFT เหมาะกับสัญญาณ stationary เท่านั้น",
"STFT ใช้หน้าต่าง (window) ขนาดแปรผันตามความถี่"], ans:[0,5,6,7]},

{ch:7, q:"Window Function ที่ใช้ใน STFT มีผลอย่างไรต่อผลลัพธ์ (เลือกได้หลายข้อ)", opts:[
"ขนาด window ส่งผลต่อ trade-off ระหว่าง time resolution และ frequency resolution",
"Window แคบ → time resolution ดี, frequency resolution แย่",
"Window กว้าง → frequency resolution ดี, time resolution แย่",
"Rectangular window ทำให้เกิด spectral leakage",
"Hamming/Hann window ช่วยลด spectral leakage",
"ขนาด window ไม่มีผลต่อผลลัพธ์ใดๆ",
"Window ขนาดใหญ่ทำให้เห็นการเปลี่ยนแปลงความถี่ได้ชัดขึ้น",
"Window function ที่นิยมได้แก่ Rectangular, Hamming, Hann, Blackman, Bartlett",
"ข้อ A-E, H ถูกทั้งหมด",
"ใช้ window ใดก็ได้ ผลเหมือนกันทุกอัน"], ans:[0,1,2,3,4,7,8]},

{ch:7, q:"ข้อจำกัดหลักของ STFT คืออะไร", opts:[
"Fixed resolution: window ขนาดเดียวใช้กับทุกความถี่ ทำให้ไม่สามารถปรับ resolution ได้",
"คำนวณช้ากว่า Fourier Transform ปกติมาก",
"ไม่สามารถวิเคราะห์สัญญาณที่มีหลายความถี่พร้อมกันได้",
"ต้องการ N เป็นเลขยกกำลัง 2 เท่านั้น",
"Heisenberg Uncertainty Principle: ไม่สามารถมี time และ frequency resolution ดีทั้งคู่พร้อมกัน",
"STFT ไม่มีข้อจำกัดใดๆ เลย เพราะปรับ window ได้",
"ข้อ A และ E อธิบายสิ่งเดียวกัน",
"ใช้ได้เฉพาะสัญญาณที่มีความถี่เดียว",
"Spectrogram ที่ได้จาก STFT ไม่สามารถแสดงผลเป็นภาพได้",
"STFT ไม่รองรับสัญญาณ real-valued"], ans:[0,4,6]},

{ch:7, q:"Spectrogram คืออะไร", opts:[
"ภาพ 2D ที่แสดง |STFT|² โดยแกน X คือเวลา แกน Y คือความถี่ และสีแสดงขนาดพลังงาน",
"กราฟที่แสดง magnitude spectrum ของสัญญาณทั้งหมดในครั้งเดียว",
"ภาพที่แสดง phase ของสัญญาณตามเวลา",
"ผลลัพธ์ของ Wavelet Transform เท่านั้น",
"เป็นชื่ออื่นของ Power Spectral Density (PSD)",
"Spectrogram ต้องการ window ขนาดคงที่เสมอ",
"ใช้ scipy.signal.stft() ในการคำนวณ และ plt.pcolormesh() แสดงผล",
"ข้อ A และ G ถูกทั้งหมด",
"Spectrogram แสดงได้เฉพาะสัญญาณที่มีความถี่คงที่",
"Spectrogram ใช้ plt.plot() ในการแสดงผล"], ans:[0,6,7]},

{ch:7, q:"Chirp signal คืออะไร และทำไมจึงเหมาะสมสำหรับทดสอบ STFT", opts:[
"สัญญาณที่ความถี่เพิ่มขึ้นหรือลดลงตามเวลาอย่างต่อเนื่อง (frequency sweep)",
"เป็น non-stationary signal จึงต้องใช้ STFT ไม่ใช่ Fourier Transform ธรรมดา",
"Spectrogram ของ chirp จะเห็นเป็นเส้นทแยงมุม แสดงการเปลี่ยนความถี่ตามเวลา",
"Fourier Transform ของ chirp จะเห็นพลังงานกระจายทั่ว spectrum",
"Chirp signal ใช้ใน radar, sonar, และ medical imaging",
"Chirp signal เป็น stationary signal",
"ข้อ A-E ถูกทั้งหมด",
"STFT ไม่สามารถวิเคราะห์ chirp signal ได้",
"Chirp signal มีความถี่คงที่ตลอดเวลา",
"ใช้สูตร: chirp(t) = sin(2π(f₀ + (f₁-f₀)·t/T_max)·t)"], ans:[0,1,2,3,4,6,9]},

{ch:7, q:"Wavelet Transform แก้ข้อจำกัดของ STFT ได้อย่างไร", opts:[
"ใช้ Multiresolution Analysis: window ปรับขนาดตามความถี่โดยอัตโนมัติ",
"ที่ความถี่สูง: window แคบ → time resolution ดี",
"ที่ความถี่ต่ำ: window กว้าง → frequency resolution ดี",
"ใช้ scale parameter แทน frequency parameter",
"Wavelet Transform ให้ resolution เดียวกันกับ STFT",
"Wavelet ใช้ basis function ที่เป็น localized wave (small wave)",
"ข้อ A-D, F ถูกทั้งหมด",
"Wavelet Transform ช้ากว่า STFT มาก จึงไม่นิยมใช้",
"Wavelet ใช้ sinusoid เป็น basis function เหมือน Fourier",
"Wavelet Transform ไม่มีข้อดีเหนือ STFT เลย"], ans:[0,1,2,3,5,6]},

{ch:7, q:"Scale parameter (s) ใน Wavelet Transform มีความหมายอย่างไร", opts:[
"s ใหญ่ = wavelet ขยาย (dilated) → จับความถี่ต่ำ, time resolution แย่",
"s เล็ก = wavelet หด (compressed) → จับความถี่สูง, time resolution ดี",
"s มีความสัมพันธ์ผกผันกับความถี่: ความถี่สูง ↔ s เล็ก",
"s เป็น parameter เดียวกับ N ใน DFT",
"s ใหญ่ = จับความถี่สูงได้ดี",
"ข้อ A, B, C ถูกทั้งหมด",
"s เล็ก = time resolution แย่",
"Scale parameter ไม่มีผลต่อ resolution",
"s ใน Wavelet เทียบได้กับ window size ใน STFT",
"ข้อ A, B, C, I ถูกทั้งหมด"], ans:[0,1,2,5,8,9]},

{ch:7, q:"Multiresolution Analysis ของ Wavelet Transform ต่างจาก STFT อย่างไร (เลือกได้หลายข้อ)", opts:[
"STFT ใช้ window ขนาดเดียวตลอด ทำให้ resolution ทั้ง time และ frequency คงที่",
"Wavelet ปรับ resolution ตามความถี่: สูง→time resolution ดี, ต่ำ→frequency resolution ดี",
"Wavelet เหมาะกับสัญญาณที่มีทั้ง transient สั้นๆ และ low-frequency trend",
"STFT เหมาะกว่า Wavelet เสมอ สำหรับทุกประเภทสัญญาณ",
"Wavelet grid ใน time-frequency plane: แถบสูง→แคบในเวลา/กว้างในความถี่",
"Wavelet grid ใน time-frequency plane: แถบต่ำ→กว้างในเวลา/แคบในความถี่",
"ทั้ง STFT และ Wavelet มี Heisenberg uncertainty",
"ข้อ A-C, E-G ถูกทั้งหมด",
"Wavelet ไม่สามารถวิเคราะห์ความถี่สูงได้",
"STFT และ Wavelet ให้ผลเหมือนกันทุกประการ"], ans:[0,1,2,4,5,6,7]},

{ch:7, q:"Wavelet คืออะไร และมีคุณสมบัติอย่างไร", opts:[
"คลื่นขนาดเล็ก (small wave) ที่มีค่าเฉลี่ยเท่ากับศูนย์ (zero mean)",
"ทำหน้าที่เป็น window function ที่ localized ทั้งในเวลาและความถี่",
"Wavelet ที่ shift ไปตามเวลา (translation) และ scale เปลี่ยน (dilation) ใช้เป็น basis",
"Wavelet มีพลังงานจำกัด (finite energy)",
"Wavelet คือ sinusoidal wave ที่ไม่มีจุดสิ้นสุด",
"ข้อ A-D ถูกทั้งหมด",
"Wavelet ต้องมีความถี่คงที่เสมอ",
"Wavelet เหมือน rectangular window ทุกประการ",
"Wavelet ไม่สามารถ localize ในโดเมนเวลาได้",
"Wavelet มีค่าเฉลี่ยไม่เป็นศูนย์เสมอ"], ans:[0,1,2,3,5]},

{ch:7, q:"เปรียบเทียบ STFT กับ Wavelet Transform ในด้านต่างๆ", opts:[
"STFT: fixed time-frequency resolution / Wavelet: adaptive multiresolution",
"STFT: ใช้ sinusoid เป็น basis / Wavelet: ใช้ wavelet (localized wave) เป็น basis",
"STFT: ผลลัพธ์คือ Spectrogram / Wavelet: ผลลัพธ์คือ Scalogram",
"STFT ดีกว่า Wavelet เสมอในทุกกรณี",
"Wavelet เหมาะกับสัญญาณที่มี transient หรือ abrupt changes",
"STFT เหมาะกับสัญญาณที่ความถี่เปลี่ยนช้าๆ (quasi-stationary)",
"ข้อ A-C, E-F ถูกทั้งหมด",
"Wavelet ใช้ผลกับ EEG, audio, image compression (JPEG2000)",
"ข้อ A-C, E-F, H ถูกทั้งหมด",
"Wavelet Transform ไม่มี inverse transform"], ans:[0,1,2,4,5,7,8]},

{ch:7, q:"ในโค้ด Python ต่อไปนี้ nperseg=256 ใน STFT มีผลอย่างไร\nfrom scipy.signal import stft\nf, t, Zxx = stft(signal, fs, nperseg=256)", opts:[
"กำหนด window size = 256 samples สำหรับแต่ละ segment",

{ch:7, q:"สัญญาณ Chirp ถูกสร้างด้วย fs = 1000 Hz, เวลา 0-5 วินาที, f₀ = 5 Hz, f₁ = 100 Hz\nนำมาทำ STFT ด้วย nperseg = 256\n\n(ก) คำนวณ Frequency Resolution (Δf) ของ STFT\n(ข) คำนวณ Time Resolution ของ STFT (กี่ samples ต่อ window)\n(ค) ถ้าเปลี่ยน nperseg = 64 time resolution และ frequency resolution เปลี่ยนอย่างไร\n(ง) อธิบายว่า Spectrogram ของ chirp signal นี้จะมีลักษณะอย่างไร",
hint:"(ก) Δf = fs / nperseg = 1000 / 256 ≈ 3.91 Hz\n\n(ข) Time resolution = nperseg / fs = 256 / 1000 = 0.256 วินาทีต่อ window\n    (แต่ละ window ครอบคลุม 256 samples = 0.256 s)\n\n(ค) เปลี่ยน nperseg = 64:\n    Δf = 1000/64 ≈ 15.63 Hz  → frequency resolution แย่ลง (coarser)\n    Time resolution = 64/1000 = 0.064 s → time resolution ดีขึ้น (finer)\n    นี่คือ trade-off: window เล็ก → เวลาละเอียด, ความถี่หยาบ\n\n(ง) ลักษณะ Spectrogram:\n    - แกน X: เวลา 0-5 วินาที\n    - แกน Y: ความถี่ 0-500 Hz (Nyquist)\n    - เห็นเส้นทแยงมุม (diagonal line) จาก (t=0, f=5Hz) → (t=5, f=100Hz)\n    - ความถี่เพิ่มขึ้นเป็นเส้นตรงตามเวลา แสดง frequency sweep ของ chirp\n    - บริเวณนอกเส้นนี้มีพลังงานน้อยมาก"},

{ch:7, q:"เปรียบเทียบ STFT กับ Wavelet Transform บนสัญญาณที่มีทั้ง low-frequency trend และ high-frequency transient\n\nสัญญาณ: x(t) = sin(2π·2t) + A·δ_pulse(t-t₀)\n(low-freq 2 Hz + impulse สั้นๆ ที่เวลา t₀)\n\n(ก) STFT ด้วย window กว้าง (nperseg=512): อธิบายผลที่ได้\n(ข) STFT ด้วย window แคบ (nperseg=32): อธิบายผลที่ได้\n(ค) Wavelet Transform: ทำไมถึงเหมาะกว่า STFT สำหรับสัญญาณแบบนี้\n(ง) อธิบายหลักการ Multiresolution Analysis",
hint:"(ก) STFT window กว้าง (nperseg=512 ที่ fs=1000 → 0.512s window):\n    - frequency resolution ดี: Δf = 1000/512 ≈ 1.95 Hz\n    - time resolution แย่: 0.512 s → ไม่เห็นว่า impulse เกิดที่เวลาไหนแน่ๆ\n    - เห็น 2 Hz ได้ชัด แต่ตำแหน่งเวลาของ impulse เบลอ\n\n(ข) STFT window แคบ (nperseg=32 → 0.032s window):\n    - time resolution ดี: 0.032 s → เห็น impulse ชัดขึ้น\n    - frequency resolution แย่: Δf = 31.25 Hz → 2 Hz กับ 0 Hz แยกไม่ออก\n    - ไม่ว่าจะปรับอย่างไร ก็ต้องแลกระหว่าง time และ frequency resolution\n\n(ค) Wavelet Transform เหมาะกว่าเพราะ:\n    - ที่ความถี่ต่ำ (2 Hz): ใช้ scale ใหญ่ → window กว้าง → frequency resolution ดี\n    - ที่ความถี่สูง (impulse): ใช้ scale เล็ก → window แคบ → time resolution ดี\n    - ปรับ resolution อัตโนมัติตามความถี่\n\n(ง) Multiresolution Analysis:\n    - วิเคราะห์สัญญาณที่หลาย scale พร้อมกัน\n    - High freq → fine time resolution, coarse freq resolution\n    - Low freq → coarse time resolution, fine freq resolution\n    - เหมาะกับสัญญาณที่มีทั้ง transient สั้นๆ และ slow variation"},

{ch:7, q:"กำหนดให้วิเคราะห์สัญญาณ EEG ที่ fs = 256 Hz เพื่อหา frequency bands:\n- Delta: 0.5-4 Hz\n- Theta: 4-8 Hz  \n- Alpha: 8-13 Hz\n- Beta: 13-30 Hz\n\n(ก) ถ้าใช้ STFT ด้วย nperseg = 256 คำนวณ Δf และบอกว่าแยก bands ได้หรือไม่\n(ข) ถ้าต้องการ Δf ≤ 0.5 Hz ต้องใช้ nperseg เท่าใดอย่างน้อย\n(ค) อธิบายว่าทำไม Wavelet Transform ถึงเหมาะกว่า STFT สำหรับ EEG\n(ง) ที่ scale ใหญ่ (low freq) และ scale เล็ก (high freq) ของ Wavelet — resolution ต่างกันอย่างไร",
hint:"(ก) nperseg = 256 samples, fs = 256 Hz\n    Δf = fs/nperseg = 256/256 = 1 Hz\n    - Delta (0.5-4 Hz): Δf=1 Hz → แยกได้แค่บางส่วน (0.5 Hz ต่ำกว่า Δf!)\n    - Theta (4-8 Hz): ได้ ~4 bins → พอใช้\n    - Alpha (8-13 Hz): ได้ ~5 bins → พอใช้\n    - Beta (13-30 Hz): ได้ ~17 bins → ดี\n    สรุป: Delta band มีปัญหา frequency resolution ต่ำเกินไป\n\n(ข) ต้องการ Δf ≤ 0.5 Hz:\n    Δf = fs/nperseg → nperseg = fs/Δf = 256/0.5 = 512 samples\n    ∴ ต้องใช้ nperseg ≥ 512 samples\n    แต่ window กว้างขึ้น → time resolution = 512/256 = 2 วินาที (แย่ลง)\n\n(ค) Wavelet เหมาะกับ EEG เพราะ:\n    - EEG มีทั้งความถี่ต่ำ (Delta) ที่ต้องการ freq resolution ดี\n    - และ transient สั้นๆ (spike, seizure) ที่ต้องการ time resolution ดี\n    - Wavelet ปรับ resolution ตามความถี่อัตโนมัติ → ดีทั้งคู่\n\n(ง) Wavelet resolution:\n    Scale ใหญ่ (low freq, e.g. Delta 1-4 Hz):\n    → window กว้าง → time resolution แย่ แต่ freq resolution ดี → แยก 0.5 Hz จาก 4 Hz ได้\n    \n    Scale เล็ก (high freq, e.g. Beta 13-30 Hz):\n    → window แคบ → time resolution ดี → จับ seizure spike ได้แม่นยำ\n    → freq resolution หยาบกว่า แต่ Beta band กว้างพอ (17 Hz) จึงไม่เป็นปัญหา"},

{ch:8, q:"ออกแบบ FIR Low-pass filter ด้วย Window method\n- Cutoff frequency: fc = 1500 Hz\n- Sampling rate: fs = 8000 Hz\n- N = 5 taps (order 4), ใช้ Rectangular window\n\nจงหา:\n(ก) Normalized cutoff frequency ωc\n(ข) Ideal impulse response h_d[n] สำหรับ n = 0, 1, 2, 3, 4\n(ค) Final h[n] หลังคูณ Rectangular window",
hint:"(ก) ωc = 2π·fc/fs = 2π·1500/8000 = 3π/8 = 0.375π rad/sample\n\n(ข) Ideal LPF: h_d[n] = sin(ωc·(n-α)) / (π·(n-α))\n    โดย α = (N-1)/2 = 2\n\n    h_d[0] = sin(0.375π·(-2)) / (π·(-2)) = sin(-0.75π)/(-2π)\n           = sin(0.75π)/(2π) = 0.7071/(2π) ≈ 0.1125\n    h_d[1] = sin(0.375π·(-1)) / (π·(-1)) = sin(-0.375π)/(-π)\n           = sin(0.375π)/π = 0.9239/π ≈ 0.2941\n    h_d[2] = ωc/π = 0.375  (ค่าที่ n=α ใช้ L'Hôpital)\n    h_d[3] = sin(0.375π·1) / (π·1) = 0.9239/π ≈ 0.2941\n    h_d[4] = sin(0.375π·2) / (π·2) = 0.7071/(2π) ≈ 0.1125\n\n(ค) Rectangular window = [1,1,1,1,1]\n    h[n] = h_d[n] · w[n] = [0.1125, 0.2941, 0.375, 0.2941, 0.1125]\n    สังเกต: symmetric → มี linear phase ✓"},

{ch:8, q:"FIR filter มี h[n] = [1, -2, 1]\n\n(ก) เขียน difference equation\n(ข) หา Transfer function H(z)\n(ค) หา zeros ของ H(z)\n(ง) Filter นี้เป็น Low-pass, High-pass, หรือ Band-pass? อธิบาย",
hint:"(ก) y[n] = x[n] - 2x[n-1] + x[n-2]\n\n(ข) H(z) = 1 - 2z⁻¹ + z⁻² = (1 - z⁻¹)²\n    หรือ H(z) = z⁻²(z² - 2z + 1) = z⁻²(z-1)²\n\n(ค) Zeros: z = 1 (double zero)\n    Poles: z = 0 (double pole, FIR)\n\n(ง) เป็น High-pass filter\n    - H(e^j0) = 1-2+1 = 0  (DC gain = 0 → กรอง DC ออก)\n    - H(e^jπ) = 1-2(-1)+1 = 4  (Nyquist gain = 4 → ผ่านความถี่สูง)\n    - Zero อยู่ที่ z=1 (ω=0) → กำจัด DC component\n    - นี่คือ second-order differentiator (High-pass)"},

{ch:9, q:"กำหนด Analog Butterworth Low-pass filter order 1:\nH(s) = Ωc / (s + Ωc) โดย Ωc = 1 rad/s\n\nใช้ Bilinear Transform แปลงเป็น Digital filter ที่ fs = 2 Hz (T = 0.5 s)\n\n(ก) ทำ Pre-warping: หา Ωc ที่ต้องใช้ ถ้าต้องการ digital cutoff ωc = π/2\n(ข) แทนค่า s = (2/T)(1-z⁻¹)/(1+z⁻¹) แล้วหา H(z)",
hint:"(ก) Pre-warping: Ωc = (2/T)·tan(ωc/2) = (2/0.5)·tan(π/4) = 4·1 = 4 rad/s\n\n(ข) H(s) = 4/(s+4)\n    แทน s = (2/0.5)·(1-z⁻¹)/(1+z⁻¹) = 4·(1-z⁻¹)/(1+z⁻¹)\n\n    H(z) = 4 / [4·(1-z⁻¹)/(1+z⁻¹) + 4]\n         = 4 / [4(1-z⁻¹+1+z⁻¹)/(1+z⁻¹)]\n         = 4(1+z⁻¹) / [4·2]\n         = (1+z⁻¹) / 2\n\n    H(z) = 0.5 + 0.5z⁻¹\n    → y[n] = 0.5·x[n] + 0.5·x[n-1]\n\n    นี่คือ 2-point moving average (FIR order 1)!\n    กรณีนี้ BLT ของ Butterworth order 1 ให้ผลเป็น FIR\n    เพราะ pre-warped Ωc พอดีกับ 2/T"},

{ch:9, q:"IIR filter: y[n] = 0.8x[n] + 0.6y[n-1]\n\n(ก) หา Transfer function H(z)\n(ข) Filter นี้เสถียรหรือไม่ เพราะอะไร\n(ค) หา DC gain H(e^j0)\n(ง) หา impulse response h[n] 4 ตัวแรก",
hint:"(ก) Y(z) = 0.8X(z) + 0.6z⁻¹Y(z)\n    Y(z)(1-0.6z⁻¹) = 0.8X(z)\n    H(z) = 0.8/(1-0.6z⁻¹)\n\n(ข) Pole อยู่ที่ z = 0.6\n    |0.6| < 1 (อยู่ภายใน unit circle)\n    ∴ Filter เสถียร ✓\n\n(ค) H(e^j0) = 0.8/(1-0.6) = 0.8/0.4 = 2.0\n    DC gain = 2.0 (เพิ่ม DC ขึ้น 2 เท่า)\n\n(ง) h[0] = 0.8\n    h[1] = 0.8·(0.6)¹ = 0.48\n    h[2] = 0.8·(0.6)² = 0.288\n    h[3] = 0.8·(0.6)³ = 0.1728\n    สูตรทั่วไป: h[n] = 0.8·(0.6)^n · u[n]  (exponential decay)"},

{ch:9, q:"ออกแบบ Notch Filter เพื่อกำจัดความถี่ 60 Hz (สัญญาณรบกวนจากไฟฟ้า)\nfs = 600 Hz, ใช้ pole radius r = 0.9\n\n(ก) คำนวณ notch angle θ\n(ข) เขียน Transfer function H(z)\n(ค) Filter นี้เสถียรหรือไม่",
hint:"(ก) θ = 2π·f₀/fs = 2π·60/600 = 2π/10 = π/5 = 0.6283 rad\n    cos(θ) = cos(π/5) = 0.8090\n\n(ข) Zeros ที่ e^(±jθ): z = e^(±jπ/5)\n    Poles ที่ r·e^(±jθ): z = 0.9·e^(±jπ/5)\n\n    H(z) = (1 - 2cos(θ)z⁻¹ + z⁻²) / (1 - 2r·cos(θ)z⁻¹ + r²z⁻²)\n         = (1 - 1.618z⁻¹ + z⁻²) / (1 - 1.4563z⁻¹ + 0.81z⁻²)\n\n    → y[n] = x[n] - 1.618x[n-1] + x[n-2] + 1.4563y[n-1] - 0.81y[n-2]\n\n(ค) Poles: z = 0.9·e^(±jπ/5)\n    |z| = 0.9 < 1 → อยู่ภายใน unit circle\n    ∴ Filter เสถียร ✓\n\n    ที่ ω = θ (60 Hz): Zeros อยู่บน unit circle → |H| = 0 → กำจัด 60 Hz สำเร็จ"},

{ch:10, q:"ข้อมูล time series: x = [10, 12, 15, 13, 16, 18, 20, 19]\n\n(ก) คำนวณค่าเฉลี่ย (mean)\n(ข) ทำ First-order differencing: y[n] = x[n] - x[n-1]\n(ค) คำนวณ Moving Average แบบ 3-point: MA[n] = (x[n-1]+x[n]+x[n+1])/3\n     สำหรับ n = 1, 2, ..., 6",
hint:"(ก) x̄ = (10+12+15+13+16+18+20+19)/8 = 123/8 = 15.375\n\n(ข) First-order differencing:\n    y[1] = 12-10 = 2\n    y[2] = 15-12 = 3\n    y[3] = 13-15 = -2\n    y[4] = 16-13 = 3\n    y[5] = 18-16 = 2\n    y[6] = 20-18 = 2\n    y[7] = 19-20 = -1\n    y = [2, 3, -2, 3, 2, 2, -1]  (ดู: Trend ที่เพิ่มขึ้นถูกลบออก ค่าเหลือสั้นๆ)\n\n(ค) 3-point Moving Average:\n    MA[1] = (10+12+15)/3 = 37/3 ≈ 12.33\n    MA[2] = (12+15+13)/3 = 40/3 ≈ 13.33\n    MA[3] = (15+13+16)/3 = 44/3 ≈ 14.67\n    MA[4] = (13+16+18)/3 = 47/3 ≈ 15.67\n    MA[5] = (16+18+20)/3 = 54/3 = 18.00\n    MA[6] = (18+20+19)/3 = 57/3 = 19.00\n    MA = [12.33, 13.33, 14.67, 15.67, 18.00, 19.00]  (smooth กว่าข้อมูลเดิม)"},

{ch:10, q:"กำหนด AR(1) model: x[t] = 0.7·x[t-1] + ε[t] โดย ε[t] ~ WN(0, σ²=1)\n\n(ก) Model นี้ stationary หรือไม่ เพราะอะไร\n(ข) คำนวณ E[x[t]] (mean)\n(ค) คำนวณ Var[x[t]]\n(ง) คำนวณ Autocorrelation R(1) และ R(2)",
hint:"(ก) AR(1) stationary เมื่อ |φ| < 1\n    φ = 0.7, |0.7| < 1 → Stationary ✓\n\n(ข) E[x[t]] = φ·E[x[t-1]] + E[ε[t]]\n    μ = 0.7μ + 0\n    0.3μ = 0 → μ = 0\n\n(ค) Var[x[t]] = φ²·Var[x[t-1]] + σ²\n    σ_x² = (0.7)²·σ_x² + 1\n    σ_x²(1 - 0.49) = 1\n    σ_x² = 1/0.51 = 1.9608\n\n(ง) Autocorrelation function:\n    R(τ) = σ_x² · φ^|τ|\n    R(0) = 1.9608\n    R(1) = 1.9608 × 0.7 = 1.3725\n    R(2) = 1.9608 × 0.7² = 1.9608 × 0.49 = 0.9608\n\n    Normalized autocorrelation:\n    ρ(1) = R(1)/R(0) = φ = 0.7\n    ρ(2) = R(2)/R(0) = φ² = 0.49"},

{ch:10, q:"สัญญาณ x[n] มี 64 samples ถูก sample ที่ fs = 256 Hz\nทำ FFT แล้วพบว่า |X[k]| มี peak สูงสุดที่ k = 8 และ k = 24\n\n(ก) คำนวณ Δf\n(ข) Peak ที่ k=8 และ k=24 ตรงกับความถี่เท่าใด\n(ค) ถ้าต้องการ Δf = 1 Hz ต้องใช้ N เท่าใด (จำนวน samples)\n(ง) สัญญาณนี้มี dominant frequencies อะไรบ้าง",
hint:"(ก) Δf = fs/N = 256/64 = 4 Hz\n\n(ข) f₁ = k₁ × Δf = 8 × 4 = 32 Hz\n    f₂ = k₂ × Δf = 24 × 4 = 96 Hz\n\n(ค) Δf = 1 Hz → N = fs/Δf = 256/1 = 256 samples\n    ต้องเก็บข้อมูล 256 จุด (หรือ zero-pad ให้ได้ 256)\n    แต่ zero-pad เพิ่มแค่ interpolation ไม่ได้เพิ่ม true resolution\n    True resolution ดีขึ้นต้องเก็บข้อมูลนานขึ้น: T = N/fs = 256/256 = 1 s\n\n(ง) Dominant frequencies: 32 Hz และ 96 Hz\n    สัญญาณน่าจะมีรูปแบบ: x(t) ≈ A·cos(2π·32t + φ₁) + B·cos(2π·96t + φ₂)\n    96/32 = 3 → อาจเป็น fundamental (32 Hz) กับ 3rd harmonic (96 Hz)"}

  state.showExplanation = {};
  state.timer = 0;
  state.mcqFilter = "all";
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => { state.timer++; updateTimer(); }, 1000);
  render();
}

function updateTimer() {
  const el = document.getElementById("timer");
  if (el) {
    const m = Math.floor(state.timer / 60);
    const s = state.timer % 60;
    el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m} นาที ${s} วินาที`;
}

// ============ MCQ ============
function getFilteredMCQ() {
  if (state.mcqFilter === "all") return MCQ;
  return MCQ.filter(q => q.ch === parseInt(state.mcqFilter));
}

function renderMCQ(app) {
  const filtered = getFilteredMCQ();
  const total = filtered.length;
  const answered = filtered.filter((_, i) => {
    const gi = MCQ.indexOf(filtered[i]);
    return state.answers[gi] && state.answers[gi].length > 0;
  }).length;

  let navHtml = filtered.map((q, i) => {
    const gi = MCQ.indexOf(q);
    let cls = "nav-cell";
    if (i === state.currentQ) cls += " current";
    if (state.submitted) {
      const ua = state.answers[gi] || [];
      const correct = arraysEqual(ua.sort(), q.ans.sort());
      cls += correct ? " nav-correct" : (ua.length > 0 ? " nav-wrong" : "");
    } else if (state.answers[gi] && state.answers[gi].length > 0) {
      cls += " answered";
    }
    return `<div class="${cls}" onclick="goToQ(${i})">${i+1}</div>`;
  }).join("");

  const q = filtered[state.currentQ];
  const gi = MCQ.indexOf(q);
  const ua = state.answers[gi] || [];
  const chNames = {7:"Time-Freq Analysis", 8:"FIR Filter", 9:"IIR Filter", 10:"Time Series"};

  let optsHtml = q.opts.map((opt, oi) => {
    let cls = "opt";
    if (ua.includes(oi)) cls += " selected";
    if (state.submitted) {
      if (q.ans.includes(oi) ) cls += " show-correct";
      else if (ua.includes(oi)) cls += " show-wrong";
    }
    return `<div class="${cls}" onclick="toggleOpt(${gi},${oi})">
      <div class="opt-letter">${LETTERS[oi]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join("");

  let explanationHtml = "";
  if (state.submitted) {
    const correct = arraysEqual(ua.sort(), q.ans.sort());
    const partialCorrect = !correct && ua.some(a => q.ans.includes(a));
    const correctLetters = q.ans.map(i => LETTERS[i]).join(", ");
    const isMulti = q.ans.length > 1;
    explanationHtml = `
      <div class="hint-box ans">
        ${correct ? "✅ ถูกต้อง!" : partialCorrect ? "⚠️ ถูกบางส่วน" : "❌ ผิด"} —
        คำตอบที่ถูก: <b>${correctLetters}</b>
        ${isMulti ? `<span class="tag-multi" style="margin-left:6px">หลายคำตอบ (${q.ans.length})</span>` : `<span class="tag-single" style="margin-left:6px">คำตอบเดียว</span>`}
      </div>`;
  }

  app.innerHTML = `
    <div class="flex-between" style="margin-bottom:8px">
      <h1 style="margin:0;font-size:1.2rem">Part 1 — ข้อกา</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="timer" id="timer">00:00</div>
        <button class="btn btn-outline" onclick="goHome()" style="font-size:.8rem;padding:5px 12px">กลับหน้าหลัก</button>
      </div>
    </div>
    <div class="tabs">
      ${["all",7,8,9,10].map(f => `<div class="tab ${state.mcqFilter == f ? 'active':''}" onclick="setFilter('${f}')">
        ${f==="all"?"ทั้งหมด":"Ch "+f}
        <span class="badge">${f==="all"?MCQ.length:MCQ.filter(q=>q.ch===parseInt(f)).length}</span>
      </div>`).join("")}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(answered/total*100)}%"></div></div>
    <div style="color:var(--text2);font-size:.8rem;text-align:right;margin-bottom:6px">ตอบแล้ว ${answered}/${total} ข้อ</div>
    <div class="nav-grid">${navHtml}</div>
    <div class="card ${state.submitted ? (arraysEqual(ua.sort(), q.ans.sort()) ? 'correct-card' : 'wrong-card') : ''}">
      <div class="q-header">
        <span class="q-num">ข้อ ${state.currentQ + 1} / ${total}</span>
        <span class="q-ch">Ch ${q.ch} — ${chNames[q.ch]}</span>
      </div>
      <div class="q-text">${q.q.replace(/\n/g,"<br>")}</div>
      <div style="color:var(--yellow);font-size:.8rem;margin-bottom:8px">💡 เลือกได้มากกว่า 1 ตัวเลือก (กดซ้ำเพื่อยกเลิก)</div>
      <div class="options">${optsHtml}</div>
      ${explanationHtml}
    </div>
    <div class="btn-row" style="justify-content:space-between">
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline" onclick="prevQ()" ${state.currentQ===0?"disabled":""}>← ก่อนหน้า</button>
        <button class="btn btn-outline" onclick="nextQ()" ${state.currentQ>=total-1?"disabled":""}>ถัดไป →</button>
      </div>
      <div style="display:flex;gap:6px">
        ${!state.submitted ? `<button class="btn btn-green" onclick="submitExam()">ส่งข้อสอบ</button>` : `<button class="btn btn-primary" onclick="showResults()">ดูผลคะแนน</button>`}
      </div>
    </div>
  `;
  updateTimer();
}

function toggleOpt(gi, oi) {
  if (state.submitted) return;
  if (!state.answers[gi]) state.answers[gi] = [];
  const idx = state.answers[gi].indexOf(oi);
  if (idx >= 0) state.answers[gi].splice(idx, 1);
  else state.answers[gi].push(oi);
  render();
}

function goToQ(i) { state.currentQ = i; render(); }
function prevQ() { if (state.currentQ > 0) { state.currentQ--; render(); } }
function nextQ() { const f = getFilteredMCQ(); if (state.currentQ < f.length - 1) { state.currentQ++; render(); } }
function setFilter(f) { state.mcqFilter = f; state.currentQ = 0; render(); }

function submitExam() {
  const total = MCQ.length;
  const answered = Object.keys(state.answers).filter(k => state.answers[k].length > 0).length;
  if (answered < total && !confirm(`คุณตอบแล้ว ${answered}/${total} ข้อ ต้องการส่งข้อสอบหรือไม่?`)) return;
  state.submitted = true;
  if (state.timerInterval) clearInterval(state.timerInterval);
  render();
}

function showResults() {
  state.view = "results";
  render();
}

function goHome() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.view = "home";
  render();
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort(), sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}

// ============ CALC ============
function renderCalc(app) {
  const q = CALC[state.currentQ];
  const chNames = {7:"Time-Freq Analysis", 8:"FIR Filter", 9:"IIR Filter", 10:"Time Series"};

  let navHtml = CALC.map((_, i) => {
    let cls = "nav-cell";
    if (i === state.currentQ) cls += " current";
    if (state.calcAnswers[i] && state.calcAnswers[i].trim().length > 0) cls += " answered";
    return `<div class="${cls}" onclick="goToCalcQ(${i})">${i+1}</div>`;
  }).join("");

  let hintHtml = "";
  if (state.showExplanation[state.currentQ]) {
    hintHtml = `<div class="hint-box explain"><b>เฉลย:</b><pre style="white-space:pre-wrap;margin-top:6px;font-family:'Courier New',monospace;font-size:.85rem;line-height:1.7">${q.hint}</pre></div>`;
  }

  app.innerHTML = `
    <div class="flex-between" style="margin-bottom:8px">
      <h1 style="margin:0;font-size:1.2rem">Part 2 — ข้อเขียน/คำนวณ</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="timer" id="timer">00:00</div>
        <button class="btn btn-outline" onclick="goHome()" style="font-size:.8rem;padding:5px 12px">กลับหน้าหลัก</button>
      </div>
    </div>
    <div class="nav-grid" style="grid-template-columns:repeat(10,1fr)">${navHtml}</div>
    <div class="card">
      <div class="q-header">
        <span class="q-num">ข้อ ${state.currentQ + 1} / ${CALC.length}</span>
        <span class="q-ch">Ch ${q.ch} — ${chNames[q.ch]}</span>
      </div>
      <div class="q-text" style="white-space:pre-wrap">${q.q}</div>
      <textarea class="calc-input" id="calcAns" placeholder="พิมพ์คำตอบที่นี่..." oninput="saveCalcAns()">${state.calcAnswers[state.currentQ] || ""}</textarea>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn ${state.showExplanation[state.currentQ] ? 'btn-primary':'btn-outline'}" onclick="toggleHint()">
          ${state.showExplanation[state.currentQ] ? "ซ่อนเฉลย" : "ดูเฉลย"}
        </button>
      </div>
      ${hintHtml}
    </div>
    <div class="btn-row" style="justify-content:space-between">
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline" onclick="prevCalcQ()" ${state.currentQ===0?"disabled":""}>← ก่อนหน้า</button>
        <button class="btn btn-outline" onclick="nextCalcQ()" ${state.currentQ>=CALC.length-1?"disabled":""}>ถัดไป →</button>
      </div>
      <button class="btn btn-outline" onclick="goHome()">กลับหน้าหลัก</button>
    </div>
  `;
  updateTimer();
}

function goToCalcQ(i) { state.currentQ = i; render(); }
function prevCalcQ() { if (state.currentQ > 0) { state.currentQ--; render(); } }
function nextCalcQ() { if (state.currentQ < CALC.length - 1) { state.currentQ++; render(); } }
function saveCalcAns() { state.calcAnswers[state.currentQ] = document.getElementById("calcAns").value; }
function toggleHint() { state.showExplanation[state.currentQ] = !state.showExplanation[state.currentQ]; render(); }

// ============ RESULTS ============
function renderResults(app) {
  let correct = 0, partial = 0, wrong = 0, unanswered = 0;
  let byCh = {7:{c:0,t:0}, 8:{c:0,t:0}, 9:{c:0,t:0}, 10:{c:0,t:0}};

  MCQ.forEach((q, i) => {
    byCh[q.ch].t++;
    const ua = state.answers[i] || [];
    if (ua.length === 0) { unanswered++; return; }
    if (arraysEqual(ua.sort(), q.ans.sort())) { correct++; byCh[q.ch].c++; }
    else if (ua.some(a => q.ans.includes(a))) partial++;
    else wrong++;
  });

  const pct = Math.round(correct / MCQ.length * 100);
  const chNames = {7:"Time-Freq Analysis", 8:"FIR Filter", 9:"IIR Filter", 10:"Time Series"};

  app.innerHTML = `
    <h1>ผลคะแนน</h1>
    <div class="scoreboard">
      <div class="score-big">${correct} / ${MCQ.length}</div>
      <div class="score-sub">${pct}% — เวลาที่ใช้: ${formatTime(state.timer)}</div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:14px;font-size:.85rem">
        <span style="color:var(--green)">✅ ถูก: ${correct}</span>
        <span style="color:var(--yellow)">⚠️ บางส่วน: ${partial}</span>
        <span style="color:var(--red)">❌ ผิด: ${wrong}</span>
        <span style="color:var(--text2)">⬜ ไม่ตอบ: ${unanswered}</span>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">คะแนนแยกตามบท</div>
      ${[7,8,9,10].map(ch => {
        const d = byCh[ch];
        const p = d.t > 0 ? Math.round(d.c/d.t*100) : 0;
        return `<div class="summary-row">
          <span>Ch ${ch}: ${chNames[ch]}</span>
          <span><b>${d.c}/${d.t}</b> (${p}%)</span>
        </div>`;
      }).join("")}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="reviewMCQ()">ดูเฉลยทีละข้อ</button>
      <button class="btn btn-outline" onclick="startExam('calc')">ไปทำ Part 2</button>
      <button class="btn btn-outline" onclick="goHome()">กลับหน้าหลัก</button>
      <button class="btn btn-outline" onclick="retryExam()">ทำใหม่</button>
    </div>
  `;
}

function reviewMCQ() {
  state.view = "mcq";
  state.currentQ = 0;
  state.mcqFilter = "all";
  render();
}

function retryExam() {
  state.answers = {};
  state.submitted = false;
  state.showExplanation = {};
  startExam("mcq");
}

// ============ INIT ============
render();
</script>
</body>
</html>
